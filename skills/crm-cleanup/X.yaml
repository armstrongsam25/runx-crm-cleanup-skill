skill: crm-cleanup
version: "0.2.0"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical

harness:
  cases:
    - name: sealed_transcript_yields_updates
      runner: default
      inputs:
        transcript: |
          Call with Sarah Chen from Acme Corp on 2026-07-01.
          Sarah said: "I am the VP of Engineering here at Acme."
          She asked about the enterprise plan and mentioned a budget of $50k for Q3.
          She wants to move forward and expects to sign by end of July.
        crm_schema:
          fields:
            - name: "title"
              type: "string"
            - name: "company"
              type: "string"
            - name: "deal_value"
              type: "number"
            - name: "stage"
              type: "enum"
              options:
                - "lead"
                - "qualified"
                - "closed"
            - name: "expected_close_date"
              type: "date"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_closed

    - name: sealed_noop_empty_field_updates
      runner: default
      inputs:
        transcript: |
          Called the general support line. The caller asked about business hours.
          No specific contact, company, or deal information was discussed.
        crm_schema:
          fields:
            - name: "title"
              type: "string"
            - name: "company"
              type: "string"
            - name: "deal_value"
              type: "number"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_closed

    - name: stop_missing_transcript
      runner: default
      inputs:
        transcript: ""
        crm_schema:
          fields:
            - name: "title"
              type: "string"
      expect:
        status: failure
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: process_failed

runners:
  default:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    outputs:
      takeaways: array
      field_updates: array
      write_proposal: object
    inputs:
      transcript:
        type: string
        required: true
        description: The interaction transcript (call/meeting notes).
      crm_schema:
        type: json
        required: true
        description: CRM schema with a fields array defining allowed CRM fields.
